<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renovate Africa | AI Sovereignty for Global Enterprise</title>
    <meta name="description" content="Renovate Africa architects AI sovereignty for global enterprises and Abuja's premium real estate market. 15 years of industry leadership.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:ital,wght@1,400;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pearl: #F5F9FA;
            --pearl-deep: #E8F0F2;
            --pearl-warm: #EDF2F4;
            --navy-teal: #0B2B2E;
            --navy-soft: #143D42;
            --arctic: #2A9D8F;
            --arctic-bright: #4ECDC4;
            --arctic-pale: #D4F5F2;
            --text: #0F2E33;
            --text-muted: #5A7A7D;
            --text-light: #8BAAB0;
            --white: #FFFFFF;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--pearl);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            color: var(--arctic);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(245, 249, 250, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            z-index: 1000;
            padding: 1.25rem 0;
            transition: var(--transition);
        }

        nav.scrolled {
            padding: 0.875rem 0;
            box-shadow: 0 4px 30px rgba(11, 43, 46, 0.06);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy-teal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.02em;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--arctic);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a:hover { color: var(--navy-teal); }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--arctic);
            transition: var(--transition);
        }

        .nav-links a:hover::after { width: 100%; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background: var(--arctic);
            color: var(--white);
            box-shadow: 0 4px 20px rgba(42, 157, 143, 0.3);
        }

        .btn-primary:hover {
            background: var(--arctic-bright);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(42, 157, 143, 0.4);
        }

        .btn-dark {
            background: var(--navy-teal);
            color: var(--white);
        }

        .btn-dark:hover {
            background: var(--navy-soft);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--navy-teal);
            border: 1.5px solid var(--navy-teal);
        }

        .btn-outline:hover {
            background: var(--navy-teal);
            color: var(--white);
        }

        .btn-outline-light {
            background: transparent;
            color: var(--white);
            border: 1.5px solid rgba(255,255,255,0.3);
        }

        .btn-outline-light:hover {
            background: var(--white);
            color: var(--navy-teal);
            border-color: var(--white);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--navy-teal);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 10rem 2rem 6rem;
            position: relative;
            overflow: hidden;
            background: var(--pearl);
        }

        .hero-grid {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 5rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--arctic);
            margin-bottom: 2rem;
        }

        .hero-eyebrow::before {
            content: '';
            width: 32px;
            height: 1px;
            background: var(--arctic);
        }

        .hero h1 {
            font-size: clamp(3rem, 5.5vw, 5.5rem);
            color: var(--navy-teal);
            margin-bottom: 1.75rem;
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .hero h1 .serif-italic { color: var(--arctic); }

        .hero-lead {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 520px;
            margin-bottom: 2.5rem;
            line-height: 1.7;
            font-weight: 400;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hero-visual {
            position: relative;
            height: 640px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image-frame {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(11, 43, 46, 0.12);
            border: 1px solid rgba(42, 157, 143, 0.2);
        }

        .hero-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 8s ease;
        }

        .hero-visual:hover .hero-image-frame img {
            transform: scale(1.05);
        }

        .floating-stat {
            position: absolute;
            background: var(--white);
            padding: 1.25rem 1.75rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(11, 43, 46, 0.12);
            border: 1px solid rgba(0,0,0,0.04);
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        .floating-stat.pos-1 { top: 8%; left: -30px; animation-delay: 0s; }
        .floating-stat.pos-2 { top: 5%; right: -20px; animation-delay: 1.5s; }
        .floating-stat.pos-3 { bottom: 18%; left: -20px; animation-delay: 3s; }
        .floating-stat.pos-4 { bottom: 12%; right: -30px; animation-delay: 4.5s; }

        .floating-stat .num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--navy-teal);
            line-height: 1;
        }

        .floating-stat .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            font-weight: 500;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Marquee */
        .marquee-section {
            background: var(--navy-teal);
            padding: 2.5rem 0;
            overflow: hidden;
            position: relative;
        }

        .marquee-track {
            display: flex;
            gap: 4rem;
            width: max-content;
            animation: marquee 30s linear infinite;
        }

        .marquee-item {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4rem;
        }

        .marquee-item::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--arctic);
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Section System */
        section { padding: 7rem 2rem; }

        .section-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--arctic);
            margin-bottom: 1.5rem;
        }

        .section-eyebrow::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--arctic);
        }

        .section-header {
            max-width: 800px;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: clamp(2.25rem, 4vw, 3.5rem);
            margin-bottom: 1.25rem;
            color: var(--navy-teal);
            line-height: 1.1;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.7;
            max-width: 600px;
        }

        .section-header.center { text-align: center; margin-left: auto; margin-right: auto; }

        /* Problem Section */
        .problem {
            background: var(--navy-teal);
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .problem::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .problem-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .problem-visual {
            position: relative;
            height: 550px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .problem-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .problem-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(42,157,143,0.3) 0%, transparent 60%);
        }

        .problem-content h2 {
            color: var(--white);
            font-size: clamp(2.25rem, 4vw, 3.25rem);
            margin-bottom: 1.5rem;
        }

        .problem-content h2 .serif-italic { color: var(--arctic-bright); }

        .problem-content > p {
            color: rgba(255,255,255,0.65);
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .problem-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .problem-item {
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }

        .problem-item-icon {
            width: 44px;
            height: 44px;
            min-width: 44px;
            background: rgba(42,157,143,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--arctic);
        }

        .problem-item h4 {
            font-size: 1.1rem;
            color: var(--white);
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        .problem-item p {
            color: rgba(255,255,255,0.55);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .abuja-callout {
            margin-top: 3rem;
            padding: 1.75rem 2rem;
            background: rgba(42,157,143,0.1);
            border-left: 3px solid var(--arctic);
            border-radius: 0 12px 12px 0;
        }

        .abuja-callout h4 {
            color: var(--arctic-bright);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .abuja-callout p {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Metrics */
        .metrics {
            background: var(--pearl);
            padding: 5rem 2rem;
            border-top: 1px solid rgba(0,0,0,0.04);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .metrics-grid {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3rem;
        }

        .metric-item {
            text-align: center;
        }

        .metric-item h3 {
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            color: var(--arctic);
            margin-bottom: 0.5rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        .metric-item p {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Services */
        .services { background: var(--white); }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .service-card {
            background: var(--pearl);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--arctic), var(--arctic-bright));
            transform: scaleX(0);
            transition: var(--transition);
            transform-origin: left;
        }

        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 50px rgba(11, 43, 46, 0.08);
            border-color: rgba(42,157,143,0.2);
        }

        .service-card:hover::before { transform: scaleX(1); }

        .service-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--navy-teal);
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        .service-icon {
            width: 56px;
            height: 56px;
            background: var(--arctic-pale);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: var(--arctic);
            transition: var(--transition);
        }

        .service-card:hover .service-icon {
            background: var(--arctic);
            color: var(--white);
            transform: scale(1.05);
        }

        /* Process */
        .process { background: var(--pearl); }

        .process-steps {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .process-step {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 2rem;
            padding: 2.5rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            transition: var(--transition);
            position: relative;
        }

        .process-step:first-child { padding-top: 0; }

        .process-step:hover {
            background: rgba(42,157,143,0.02);
            margin: 0 -2rem;
            padding-left: 2rem;
            padding-right: 2rem;
            border-radius: 16px;
            border-bottom-color: transparent;
        }

        .step-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--arctic);
            opacity: 0.4;
            line-height: 1;
            transition: var(--transition);
        }

        .process-step:hover .step-number { opacity: 1; }

        .step-content h3 {
            font-size: 1.35rem;
            margin-bottom: 0.5rem;
            color: var(--navy-teal);
        }

        .step-content p {
